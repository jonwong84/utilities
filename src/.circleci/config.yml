version: 2.1

jobs:
  build-and-publish:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
      - checkout
      - run:
          name: Restore dependencies
          command: dotnet restore
      - run:
          name: Build project
          command: dotnet build --configuration Release
      - run:
          name: Pack NuGet package
          command: dotnet pack Configuration/Implementation/Utilities.Configuration.csproj --configuration Release
      - run:
          name: Publish to GitHub Packages
          command: |
            dotnet nuget push Configuration/Implementation/bin/Release/Utilities.Configuration.*.nupkg \
              --api-key ${GITHUB_TOKEN} \
              --source "https://nuget.pkg.github.com/jonwong84/index.json"

workflows:
  version: 2
  build_and_publish:
    jobs:
      - build-and-publish
